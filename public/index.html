<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iviejo — photography</title>
  <link rel="icon" href="../../assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="WorkGrid.jsx"></script>
  <script type="text/babel" src="ProjectDetail.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      // route: 'home' | 'work' | 'about' | 'journal' | 'contact' | 'project:<id>'
      const [route, setRoute] = useState('home');

      const go = (r) => {
        setRoute(r);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
      const openProject = (id) => go('project:' + id);

      let body;
      if (route === 'home') {
        body = (
          <>
            <Hero go={go} />
            <WorkGrid openProject={openProject} />
          </>
        );
      } else if (route === 'work') {
        body = <WorkGrid openProject={openProject} />;
      } else if (route.startsWith('project:')) {
        const id = route.split(':')[1];
        body = <ProjectDetail projectId={id} go={go} openProject={openProject} />;
      } else if (route === 'about') {
        body = <About go={go} />;
      } else if (route === 'contact') {
        body = <Contact />;
      } else if (route === 'journal') {
        body = (
          <section className="section">
            <div className="section-header">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <span className="eyebrow">journal</span>
                <h2 className="section-title">writing, soon.</h2>
              </div>
            </div>
            <p style={{ maxWidth: '38ch', fontFamily: 'var(--font-sans)', fontSize: 17, color: 'var(--graphite)' }}>
              we are putting together a few short essays and process notes. check back in autumn.
            </p>
          </section>
        );
      }

      return (
        <div className="page" data-screen-label={route}>
          <Nav route={route.startsWith('project:') ? 'work' : route} go={go} />
          {body}
          <Footer go={go} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
