<!doctype html><html><head><meta charset="utf-8"><title>spacing</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:22px 32px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <span class="caption">4px base · use flex/grid with gap, never per-element margins</span>

      <div style="display:flex; align-items:center; gap:14px;"><span style="width:90px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">--space-1 · 4</span><div style="width:4px; height:14px; background:var(--ink);"></div></div>

      <div style="display:flex; align-items:center; gap:14px;"><span style="width:90px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">--space-4 · 16</span><div style="width:16px; height:14px; background:var(--ink);"></div></div>
      <div style="display:flex; align-items:center; gap:14px;"><span style="width:90px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">--space-6 · 24</span><div style="width:24px; height:14px; background:var(--ink);"></div></div>
      <div style="display:flex; align-items:center; gap:14px;"><span style="width:90px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">--space-8 · 40</span><div style="width:40px; height:14px; background:var(--ink);"></div></div>

      <div style="display:flex; align-items:center; gap:14px;"><span style="width:90px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">--space-section · 160</span><div style="width:160px; height:14px; background:var(--forest);"></div></div>
    </div>
  </div>
