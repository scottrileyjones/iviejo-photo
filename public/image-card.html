<!doctype html><html><head><meta charset="utf-8"><title>image card</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; gap:24px;">
    <!-- card 1 -->
    <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio: 4/5; background:linear-gradient(180deg, #E8D4BD, #7A4A33);"></div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span style="font-family:var(--font-display); font-weight:300; font-size:18px; color:var(--ink); line-height:1.1;">Marisol</span>
        <span style="font-family:var(--font-mono); font-size:11px; color:var(--slate);">2024</span>
      </div>
      <span class="caption" style="font-family:var(--font-mono); font-size:11px; color:var(--slate);">oaxaca · portra 400</span>
    </div>
    <!-- card 2 -->
    <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio: 4/5; background:linear-gradient(180deg, #D9D5CF, #1F1D1A);"></div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span style="font-family:var(--font-display); font-weight:300; font-size:18px; color:var(--ink); line-height:1.1;">Linen, weather</span>
        <span style="font-family:var(--font-mono); font-size:11px; color:var(--slate);">2024</span>
      </div>
      <span class="caption" style="font-family:var(--font-mono); font-size:11px; color:var(--slate);">studio · b&amp;w · hp5+</span>
    </div>
  </div>
</body></html>
