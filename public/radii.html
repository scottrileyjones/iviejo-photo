<!doctype html><html><head><meta charset="utf-8"><title>radii</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; gap:32px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
      <div style="width:90px; height:90px; background:var(--linen); border:1px solid var(--border);"></div>
      <span class="caption">--r-0 · 0px</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">images, sections</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
      <div style="width:90px; height:90px; background:var(--linen); border:1px solid var(--border); border-radius:2px;"></div>
      <span class="caption">--r-1 · 2px</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">buttons, inputs</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
      <div style="width:140px; height:36px; background:var(--linen); border:1px solid var(--border); border-radius:9999px; display:flex; align-items:center; justify-content:center; font-family:var(--font-sans); font-size:12px; color:var(--ink);">portrait</div>
      <span class="caption">--r-pill · 9999px</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">filter chips only</span>
    </div>
  </div>
</body></html>
