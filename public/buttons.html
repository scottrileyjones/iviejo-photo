<!doctype html><html><head><meta charset="utf-8"><title>buttons</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:22px 32px;">
  <div style="display:flex; flex-direction:column; gap:20px;">
    <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
      <button style="background:var(--ink); color:var(--bone); border:0; padding:13px 22px; font-family:var(--font-sans); font-size:13px; font-weight:500; letter-spacing:0.02em; border-radius:2px; cursor:pointer;">book a sitting</button>
      <button style="background:var(--forest); color:var(--bone); border:0; padding:13px 22px; font-family:var(--font-sans); font-size:13px; font-weight:500; letter-spacing:0.02em; border-radius:2px; cursor:pointer;">enquire</button>
      <button style="background:transparent; color:var(--ink); border:1px solid var(--stone); padding:12px 22px; font-family:var(--font-sans); font-size:13px; font-weight:500; letter-spacing:0.02em; border-radius:2px; cursor:pointer;">view portfolio</button>
      <a href="#" style="font-family:var(--font-sans); font-size:13px; font-weight:500; color:var(--ink); text-decoration:underline; text-underline-offset:4px;">read more →</a>
    </div>
    <div style="display:flex; gap:14px; align-items:center;">
      <span class="caption" style="width:90px;">primary</span>
      <span class="caption" style="width:90px;">accent</span>
      <span class="caption" style="width:114px;">outline</span>
      <span class="caption">text link</span>
    </div>
  </div>
</body></html>
