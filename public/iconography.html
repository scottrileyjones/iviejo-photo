<!doctype html><html><head><meta charset="utf-8"><title>iconography</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; gap:28px; align-items:center;">
      <!-- arrow-right -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      <!-- close -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      <!-- search -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="15.5" y2="15.5"/></svg>
      <!-- camera (subtle nod) -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><rect x="3" y="7" width="18" height="13"/><path d="M9 7l1.5-3h3L15 7"/><circle cx="12" cy="13.5" r="3.5"/></svg>
      <!-- plus -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <!-- chevron-down -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><polyline points="6 9 12 15 18 9"/></svg>
      <!-- account -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1714" stroke-width="1.25" stroke-linecap="square"><circle cx="12" cy="9" r="3.5"/><path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/></svg>
    </div>
    <span class="caption">hairline · 1.25px stroke · square endcaps · 24px. system: Lucide via CDN.</span>
  </div>
</body></html>
