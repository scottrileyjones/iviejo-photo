<!doctype html><html><head><meta charset="utf-8"><title>motion</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:24px 32px;">
  <style>
    @keyframes rise { from { transform: translateY(8px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .rise { animation: rise 600ms cubic-bezier(0.2, 0.6, 0.2, 1) infinite alternate; }
    @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.02); } }
    .zoom { animation: zoom 800ms cubic-bezier(0.2, 0.6, 0.2, 1) infinite alternate; }
  </style>
  <div style="display:flex; gap:28px;">
    <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
      <div style="height:80px; background:var(--linen); display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <span class="rise" style="font-family:var(--font-display); font-weight:300; font-size:30px; color:var(--ink); line-height:1;">light &amp; form</span>
      </div>
      <span class="caption">fade + 8px rise · 600ms · ease-out</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">section entries</span>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
      <div style="height:80px; background:linear-gradient(180deg, #C99979, #7A4A33); overflow:hidden;">
        <div class="zoom" style="width:100%; height:100%;"></div>
      </div>
      <span class="caption">1.02× zoom · 800ms · ease-out</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">image hover only</span>
    </div>
  </div>
</body></html>
