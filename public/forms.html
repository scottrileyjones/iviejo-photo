<!doctype html><html><head><meta charset="utf-8"><title>form fields</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:22px 32px;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px 28px; max-width:620px;">
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-family:var(--font-sans); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em; color:var(--slate);">your name</label>
      <input value="Marisol Calderón" style="background:transparent; border:0; border-bottom:1px solid var(--ink); padding:6px 0; font-family:var(--font-sans); font-size:15px; color:var(--ink); outline:none;">
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-family:var(--font-sans); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em; color:var(--slate);">email</label>
      <input placeholder="you@studio.com" style="background:transparent; border:0; border-bottom:1px solid var(--stone); padding:6px 0; font-family:var(--font-sans); font-size:15px; color:var(--ink); outline:none;">
    </div>
    <div style="display:flex; flex-direction:column; gap:6px; grid-column:1/-1;">
      <label style="font-family:var(--font-sans); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em; color:var(--slate);">tell us about the shoot</label>
      <textarea rows="2" style="background:transparent; border:0; border-bottom:1px solid var(--stone); padding:6px 0; font-family:var(--font-sans); font-size:15px; color:var(--ink); outline:none; resize:none;">a small editorial — three looks, two locations.</textarea>
    </div>
  </div>
</body></html>
