<!doctype html><html><head><meta charset="utf-8"><title>borders &amp; rules</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:24px 32px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:28px;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <span class="caption">hairline · 1px var(--stone)</span>
      <div>
        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-family:var(--font-sans); font-size:13px;"><span>Marisol — Oaxaca</span><span style="color:var(--slate); font-family:var(--font-mono); font-size:11px;">2024</span></div>
        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-family:var(--font-sans); font-size:13px;"><span>Linen, weather</span><span style="color:var(--slate); font-family:var(--font-mono); font-size:11px;">2024</span></div>
        <div style="display:flex; justify-content:space-between; padding:10px 0; font-family:var(--font-sans); font-size:13px;"><span>Studio, mornings</span><span style="color:var(--slate); font-family:var(--font-mono); font-size:11px;">2025</span></div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <span class="caption">hairline-soft · 1px var(--putty)</span>
      <div style="display:flex; gap:18px;">
        <div style="font-family:var(--font-sans); font-size:13px;">portrait</div>
        <div style="width:1px; background:var(--border-soft);"></div>
        <div style="font-family:var(--font-sans); font-size:13px;">still life</div>
        <div style="width:1px; background:var(--border-soft);"></div>
        <div style="font-family:var(--font-sans); font-size:13px;">editorial</div>
      </div>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate); opacity:0.7;">vertical rules between editorial columns</span>
    </div>
  </div>
</body></html>
