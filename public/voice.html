<!doctype html><html><head><meta charset="utf-8"><title>voice samples</title><link rel="stylesheet" href="_preview.css"></head>
<body style="padding:22px 32px;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px 36px;">
    <div style="display:flex; flex-direction:column; gap:8px;">
      <span class="eyebrow" style="color:#5A6B4B; font-family:var(--font-sans); font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em;">✓ on voice</span>
      <p style="margin:0; font-family:var(--font-display); font-weight:300; font-size:22px; line-height:1.2; letter-spacing:-0.015em; color:var(--ink);">a studio for portrait, still life, and editorial photography. brooklyn, since 2019.</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <span class="eyebrow" style="color:#8a5a4a; font-family:var(--font-sans); font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em;">✗ off voice</span>
      <p style="margin:0; font-family:var(--font-sans); font-size:15px; line-height:1.4; color:var(--slate); text-decoration:line-through; text-decoration-color:rgba(138,90,74,0.4);">Unlock your story with our amazing photography services! Click here to elevate your brand today 📸</p>
    </div>
    <div style="grid-column:1/-1; height:1px; background:var(--border);"></div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <span class="caption" style="opacity:0.7;">CTA</span>
      <span style="font-family:var(--font-sans); font-size:14px; color:var(--ink);">book a sitting</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <span class="caption" style="opacity:0.7;">caption</span>
      <span style="font-family:var(--font-mono); font-size:12px; color:var(--slate);">Marisol — Oaxaca, 2024</span>
    </div>
  </div>
</body></html>
