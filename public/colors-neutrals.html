<!doctype html><html><head><meta charset="utf-8"><title>warm neutrals</title><link rel="stylesheet" href="_preview.css"></head>
<body>
  <div class="card-row" style="gap:0;">
    <div style="flex:1; height:120px; background:#F6F2EC; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--ink);">bone</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate);">#F6F2EC</span>
    </div>
    <div style="flex:1; height:120px; background:#ECE5DA; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--ink);">linen</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate);">#ECE5DA</span>
    </div>
    <div style="flex:1; height:120px; background:#DCD2C2; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--ink);">putty</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate);">#DCD2C2</span>
    </div>
    <div style="flex:1; height:120px; background:#C9C2B8; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--ink);">stone</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--slate);">#C9C2B8</span>
    </div>
    <div style="flex:1; height:120px; background:#6B655C; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--bone);">slate</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--bone); opacity:0.75;">#6B655C</span>
    </div>
    <div style="flex:1; height:120px; background:#3A352F; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--bone);">graphite</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--bone); opacity:0.75;">#3A352F</span>
    </div>
    <div style="flex:1; height:120px; background:#1A1714; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--bone);">ink</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--bone); opacity:0.75;">#1A1714</span>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--slate);">warm neutral scale — the entire ui lives here</div>
</body></html>
